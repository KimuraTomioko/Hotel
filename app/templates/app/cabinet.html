{% extends "app/base.html" %}

{% block title %}Личный кабинет — Hotel Desk{% endblock %}

{% block content %}
<div class="page-banner">
    <div class="eyebrow">Личный кабинет</div>
    <h1>Мой профиль</h1>
</div>

<div id="notice" class="notice hidden" style="margin: 0 clamp(16px,4vw,52px) 20px;"></div>

<div class="dashboard" style="padding: 0 clamp(16px,4vw,52px) 60px;">
    <div style="display:grid; gap:16px; align-content:start;">
        <div class="panel panel-gold">
            <div class="panel-head">
                <h2>Профиль</h2>
            </div>
            <div id="profileCard" class="profile-card">
                <p class="empty">Войдите, чтобы увидеть данные профиля.</p>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-head">
            <h2>Мои бронирования</h2>
            <button id="refreshBookingsButton" class="ghost" type="button">Обновить</button>
        </div>
        <div id="bookingsList" class="bookings-list">
            <p class="empty">Брони появятся после входа.</p>
        </div>
    </div>
</div>

<template id="bookingTemplate">
    <article class="booking-card">
        <div>
            <strong></strong>
            <span></span>
        </div>
        <b></b>
    </article>
</template>
{% endblock %}
