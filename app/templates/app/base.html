{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Hotel Desk{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{% static 'app/styles.css' %}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="/">
            <span class="brand-mark">H</span>
            <div>
                <div class="brand-name">Hotel Desk</div>
                <div class="brand-sub">Luxury Stays</div>
            </div>
        </a>

        <nav class="main-nav" aria-label="Основная навигация">
            <a href="/">Каталог</a>
            <a href="/hotels/new/">Добавить отель</a>
            <a href="/cabinet/">Кабинет</a>
            <a href="/auth/">Войти</a>
        </nav>

        <div class="session">
            <span id="sessionStatus" class="session-email">Гость</span>
            <button id="logoutButton" class="ghost hidden" type="button">Выйти</button>
        </div>
    </header>

    <main class="{% block main_class %}page-shell{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'app/app.js' %}"></script>
</body>
</html>
